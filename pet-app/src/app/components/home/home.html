<div class="p-6">

  <div class="max-w-6xl mx-auto px-6 pt-28 pb-10">

  <div class="grid md:grid-cols-2 gap-10 items-center">

    <!-- LEFT SIDE -->
    <div>

      <h1 class="text-4xl md:text-5xl font-bold text-white leading-tight">
        Find Your <span class="text-blue-400">Perfect Pet</span> Companion 🐾
      </h1>

      <p class="mt-4 text-gray-400 text-lg">
        Browse pets looking for a home and discover the one that fits your lifestyle.
      </p>

      <div class="mt-6 flex gap-4">

        <button 
          routerLink="/match"
          class="bg-linear-to-r from-blue-500 to-cyan-400 
                 text-white px-6 py-3 rounded-lg 
                 hover:opacity-90 transition shadow">
          Find Match
        </button>

        <button 
          routerLink="/add"
          class="border border-white/20 text-gray-300 px-6 py-3 rounded-lg 
                 hover:bg-white/10 transition">
          Add a Pet
        </button>

      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="relative">

      <img 
        src="https://placedog.net/500/400"
        class="rounded-2xl shadow-xl w-full object-cover"
      />

      <!-- Glow effect -->
      <div class="absolute inset-0 rounded-2xl bg-blue-500/10 blur-2xl -z-10"></div>

    </div>

  </div>

</div>
  <h2 class="text-2xl font-bold mb-6">Available Pets 🐾</h2>

  <div class="grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">

    <app-pet-card
      *ngFor="let pet of pets"
      [pet]="pet">
    </app-pet-card>

  </div>

</div>
