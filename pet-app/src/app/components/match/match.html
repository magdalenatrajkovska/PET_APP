<div class="max-w-4xl mx-auto px-6 pt-28 pb-16">

  <h1 class="text-3xl font-bold text-white mb-8">
    Find Your Perfect Match 🐾
  </h1>

  <form (ngSubmit)="findMatch()" class="space-y-6">

    <!-- TYPES -->
    <div>
      <label class="text-gray-300 text-sm mb-2 block">
        Preferred Animals
      </label>

      <div class="flex flex-wrap gap-2">

        <button 
          *ngFor="let t of types"
          type="button"
          (click)="toggleType(t)"
          class="px-4 py-2 rounded-full border transition"
          [ngClass]="form.types.includes(t)
            ? 'bg-blue-500 text-white border-blue-400'
            : 'bg-[#1e293b] text-gray-300 border-white/10'">

          {{ t }}

        </button>

      </div>
    </div>

    <!-- ENERGY -->
    <div>
      <label class="text-gray-300 text-sm">
        Energy: {{ mapLevel(form.energyLevel) }}
      </label>

      <input type="range" min="1" max="3"
        [(ngModel)]="form.energyLevel"
        name="energy"
        class="w-full accent-blue-500"/>

      <div class="flex justify-between text-xs text-gray-400 mt-1">
        <span>Low</span>
        <span>Medium</span>
        <span>High</span>
      </div>
    </div>

    <!-- SPACE -->
    <div>
      <label class="text-gray-300 text-sm">
        Space: {{ mapLevel(form.spaceNeed) }}
      </label>

      <input type="range" min="1" max="3"
        [(ngModel)]="form.spaceNeed"
        name="space"
        class="w-full accent-blue-500"/>

      <div class="flex justify-between text-xs text-gray-400 mt-1">
        <span>Small</span>
        <span>Medium</span>
        <span>Large</span>
      </div>
    </div>

    <!-- CARE -->
    <div>
      <label class="text-gray-300 text-sm">
        Care: {{ mapLevel(form.careLevel) }}
      </label>

      <input type="range" min="1" max="3"
        [(ngModel)]="form.careLevel"
        name="care"
        class="w-full accent-blue-500"/>

      <div class="flex justify-between text-xs text-gray-400 mt-1">
        <span>Easy</span>
        <span>Medium</span>
        <span>Hard</span>
      </div>
    </div>

    <!-- TOGGLES -->
    <div class="grid grid-cols-2 gap-4">

      <button type="button"
        (click)="form.goodWithKids = !form.goodWithKids"
        class="p-3 rounded-lg border transition"
        [ngClass]="form.goodWithKids 
          ? 'bg-green-500 text-white' 
          : 'bg-[#1e293b] text-gray-300 border-white/10'">

        Kids: {{ form.goodWithKids ? 'Yes' : 'No' }}

      </button>

      <button type="button"
        (click)="form.goodWithPets = !form.goodWithPets"
        class="p-3 rounded-lg border transition"
        [ngClass]="form.goodWithPets 
          ? 'bg-green-500 text-white' 
          : 'bg-[#1e293b] text-gray-300 border-white/10'">

        Pets: {{ form.goodWithPets ? 'Yes' : 'No' }}

      </button>

    </div>

    <!-- SUBMIT -->
    <button 
      type="submit"
      class="w-full bg-gradient-to-r from-blue-500 to-cyan-400 
             text-white py-3 rounded-lg 
             hover:opacity-90 transition shadow">

      Find Match

    </button>

  </form>

  <!-- RESULTS -->
  <div 
  *ngIf="results.length" 
  id="resultsSection"
  class="mt-12">

    <h2 class="text-xl text-white mb-6">
      Top Matches 🎯
    </h2>

    <div class="grid md:grid-cols-3 gap-6">

      <app-pet-card 
        *ngFor="let pet of results"
        [pet]="pet">
      </app-pet-card>

    </div>

  </div>

</div>
