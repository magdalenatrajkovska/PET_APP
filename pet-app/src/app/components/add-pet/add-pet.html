<div class="min-h-screen relative" style="background:#fdf8f3; font-family:'DM Sans',sans-serif;">

  <!-- LEFT ADS -->
  <div class="hidden lg:block fixed left-0 top-0 h-full w-[160px] p-3 z-10">
    <div class="h-full rounded-2xl border border-[#f0e0d0] bg-[#fff8f0] flex items-center justify-center text-xs"
         style="color:#b09080;">
      SPACE FOR ADS
    </div>
  </div>

  <!-- RIGHT ADS -->
  <div class="hidden lg:block fixed right-0 top-0 h-full w-[160px] p-3 z-10">
    <div class="h-full rounded-2xl border border-[#f0e0d0] bg-[#fff8f0] flex items-center justify-center text-xs"
         style="color:#b09080;">
      SPACE FOR ADS
    </div>
  </div>

  <!-- CENTER CONTENT -->
  <div class="lg:mx-[170px]">

    <div class="max-w-3xl mx-auto px-6 pt-28 pb-20">

      <!-- HEADER -->
      <div class="mb-10">
        <h1 class="text-3xl font-bold" style="color:#2d1a0e;">
          Add a Pet 🐾
        </h1>
        <p class="mt-2 text-sm" style="color:#8a6a5a;">
          Create a profile so others can find a loving home.
        </p>
      </div>

      <!-- FORM -->
      <form #form="ngForm" (ngSubmit)="onSubmit()"
            class="space-y-7 p-6 rounded-3xl shadow-sm"
            style="background:#fff8f0;border:1.5px solid #f0e0d0;">

        <!-- NAME -->
        <div>
          <label class="block text-xs font-semibold mb-2 uppercase tracking-wide"
                 style="color:#8a6a5a;">
            Pet Name
          </label>

          <input [(ngModel)]="pet.name" name="name" required
            class="w-full px-4 py-3 rounded-2xl outline-none transition"
            style="background:#fff;border:1.5px solid #e8d0bc;color:#2d1a0e;"
            placeholder="e.g. Luna, Max, Mochi"/>
        </div>

        <!-- TYPE -->
        <div>
          <label class="block text-xs font-semibold mb-2 uppercase tracking-wide"
                 style="color:#8a6a5a;">
            Animal Type
          </label>

          <select [(ngModel)]="pet.type" name="type" required
            class="w-full px-4 py-3 rounded-2xl outline-none transition"
            style="background:#fff;border:1.5px solid #e8d0bc;color:#2d1a0e;">

            <option value="" disabled>Select type</option>

            <option *ngFor="let type of types" [value]="type">
              {{ type }}
            </option>

            <option value="Other">Other</option>
          </select>

          <input *ngIf="pet.type === 'Other'"
            [(ngModel)]="pet.customType"
            name="customType"
            placeholder="Enter animal type"
            class="mt-3 w-full px-4 py-3 rounded-2xl outline-none transition"
            style="background:#fff;border:1.5px solid #e8d0bc;color:#2d1a0e;"/>
        </div>

        <!-- AGE -->
        <div>
          <label class="block text-xs font-semibold mb-2 uppercase tracking-wide"
                 style="color:#8a6a5a;">
            Age
          </label>

          <input type="number" min="1" required
            [(ngModel)]="pet.age" name="age"
            class="w-full px-4 py-3 rounded-2xl outline-none"
            style="background:#fff;border:1.5px solid #e8d0bc;color:#2d1a0e;"
            placeholder="Enter age"/>
        </div>

        <!-- ENERGY -->
        <div>
          <label class="block text-xs font-semibold mb-3 uppercase tracking-wide"
                 style="color:#8a6a5a;">
            Energy Level:
            <span style="color:#c45628;font-weight:600;">
              {{ mapLevel(pet.energyLevel) }}
            </span>
          </label>

          <div class="flex items-center gap-4">
            <span style="color:#b09080;">Low</span>
            <input type="range" min="1" max="3" step="1"
              [(ngModel)]="pet.energyLevel"
              name="energy"
              class="w-full accent-[#c45628]"/>
            <span style="color:#b09080;">High</span>
          </div>
        </div>

        <!-- SPACE -->
        <div>
          <label class="block text-xs font-semibold mb-3 uppercase tracking-wide"
                 style="color:#8a6a5a;">
            Space Needed:
            <span style="color:#c45628;font-weight:600;">
              {{ mapLevel(pet.spaceNeed) }}
            </span>
          </label>

          <div class="flex items-center gap-4">
            <span style="color:#b09080;">Small</span>
            <input type="range" min="1" max="3" step="1"
              [(ngModel)]="pet.spaceNeed"
              name="space"
              class="w-full accent-[#c45628]"/>
            <span style="color:#b09080;">Large</span>
          </div>
        </div>

        <!-- CARE -->
        <div>
          <label class="block text-xs font-semibold mb-3 uppercase tracking-wide"
                 style="color:#8a6a5a;">
            Care Level:
            <span style="color:#c45628;font-weight:600;">
              {{ mapLevel(pet.careLevel) }}
            </span>
          </label>

          <div class="flex items-center gap-4">
            <span style="color:#b09080;">Easy</span>
            <input type="range" min="1" max="3" step="1"
              [(ngModel)]="pet.careLevel"
              name="care"
              class="w-full accent-[#c45628]"/>
            <span style="color:#b09080;">Hard</span>
          </div>
        </div>

        <!-- TOGGLES -->
        <div class="grid grid-cols-2 gap-4">

          <button type="button"
            (click)="pet.goodWithKids = !pet.goodWithKids"
            class="py-2.5 rounded-2xl transition"
            [style.background]="pet.goodWithKids ? '#fde8d8' : '#fff'"
            [style.border]="pet.goodWithKids ? '1.5px solid #c45628' : '1.5px solid #f0e0d0'"
            [style.color]="pet.goodWithKids ? '#c45628' : '#8a6a5a'">

            {{ pet.goodWithKids ? 'Kids 👍' : 'Kids 👎' }}

          </button>

          <button type="button"
            (click)="pet.goodWithPets = !pet.goodWithPets"
            class="py-2.5 rounded-2xl transition"
            [style.background]="pet.goodWithPets ? '#fde8d8' : '#fff'"
            [style.border]="pet.goodWithPets ? '1.5px solid #c45628' : '1.5px solid #f0e0d0'"
            [style.color]="pet.goodWithPets ? '#c45628' : '#8a6a5a'">

            {{ pet.goodWithPets ? 'Pets 🐾' : 'Pets 🚫' }}

          </button>

        </div>

        <!-- IMAGE -->
        <div>
          <label class="block text-xs font-semibold mb-2 uppercase tracking-wide"
                 style="color:#8a6a5a;">
            Image URL
          </label>

          <input [(ngModel)]="pet.imageUrl" name="imageUrl"
            class="w-full px-4 py-3 rounded-2xl outline-none"
            style="background:#fff;border:1.5px solid #e8d0bc;color:#2d1a0e;"
            placeholder="https://..."/>
        </div>

        <!-- UPLOAD -->
        <div>
          <label class="block text-xs font-semibold mb-2 uppercase tracking-wide"
                 style="color:#8a6a5a;">
            Upload Image
          </label>

          <div class="flex items-center gap-3">

            <input type="file" #fileInput (change)="onFileSelected($event)" class="hidden"/>

            <button type="button"
              (click)="fileInput.click()"
              class="px-5 py-3 rounded-2xl"
              style="background:#fff8f0;border:1.5px solid #f0e0d0;color:#8a6a5a;">
              📁 Choose Image
            </button>

            <span style="color:#b09080;font-size:12px;">
              Optional
            </span>

          </div>
        </div>

        <!-- DESCRIPTION -->
        <div>
          <label class="block text-xs font-semibold mb-2 uppercase tracking-wide"
                 style="color:#8a6a5a;">
            Description
          </label>

          <textarea [(ngModel)]="pet.description"
            name="desc"
            rows="4"
            class="w-full px-4 py-3 rounded-2xl resize-none"
            style="background:#fff;border:1.5px solid #e8d0bc;color:#2d1a0e;"></textarea>
        </div>

        <!-- SUBMIT -->
        <button type="submit"
          [disabled]="form.invalid"
          class="w-full py-3.5 rounded-2xl font-semibold text-white"
          style="background:linear-gradient(135deg,#e07840,#c45628);">

          Add Pet 🐾

        </button>

      </form>

    </div>

  </div>

</div>
