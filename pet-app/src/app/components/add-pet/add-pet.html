<div class="max-w-3xl mx-auto px-6 pt-28 pb-16">

  <h1 class="text-3xl font-bold text-white mb-8">
    Add a Pet 🐾
  </h1>

  <form #form="ngForm" (ngSubmit)="onSubmit()" class="space-y-6">

    <!-- NAME -->
    <div>
      <label class="block text-sm text-gray-300 mb-1">Name</label>
      <input [(ngModel)]="pet.name" name="name" required
        class="w-full p-3 rounded-lg bg-[#1e293b] text-white border border-white/10"/>
    </div>

    <!-- TYPE -->
    <div>
      <label class="block text-sm text-gray-300 mb-1">Animal Type</label>
      <select [(ngModel)]="pet.type" name="type" required
        class="w-full p-3 rounded-lg bg-[#1e293b] text-white border border-white/10">

            <option value="" disabled>Select type</option>

            <option *ngFor="let type of types" [value]="type">
            {{ type }}
            </option>

            <option value="Other">Other</option>
      </select>

      <input *ngIf="pet.type === 'Other'"
        [(ngModel)]="pet.customType"
        name="customType"
        placeholder="Enter animal type"
        class="mt-2 w-full p-3 rounded-lg bg-[#1e293b] text-white border border-white/10"/>
    </div>

    <!-- AGE -->
    <div>
      <label class="block text-sm text-gray-300 mb-1">Age</label>
      <input type="number" min="1" required
        [(ngModel)]="pet.age"
        name="age"
        class="w-full p-3 rounded-lg bg-[#1e293b] text-white border border-white/10"/>
    </div>

    <!-- ENERGY -->
    <div>
      <label class="block text-sm text-gray-300 mb-1">
        Energy Level: <span class="text-white">{{ mapLevel(pet.energyLevel) }}</span>
      </label>
      <input type="range" min="1" max="3" step="1"
        [(ngModel)]="pet.energyLevel"
        name="energy"
        class="w-full accent-blue-500"/>

      <div class="flex justify-between text-xs text-gray-400 mt-1">
        <span>Low</span>
        <span>Medium</span>
        <span>High</span>
      </div>
    </div>

    <!-- SPACE -->
    <div>
      <label class="block text-sm text-gray-300 mb-1">
        Space Needed: <span class="text-white">{{ mapLevel(pet.spaceNeed) }}</span>
      </label>
      <input type="range" min="1" max="3" step="1"
        [(ngModel)]="pet.spaceNeed"
        name="space"
        class="w-full accent-blue-500"/>

      <div class="flex justify-between text-xs text-gray-400 mt-1">
        <span>Small</span>
        <span>Medium</span>
        <span>Large</span>
      </div>
    </div>

    <!-- CARE -->
    <div>
      <label class="block text-sm text-gray-300 mb-1">
        Care Level: <span class="text-white">{{ mapLevel(pet.careLevel) }}</span>
      </label>
      <input type="range" min="1" max="3" step="1"
        [(ngModel)]="pet.careLevel"
        name="care"
        class="w-full accent-blue-500"/>

      <div class="flex justify-between text-xs text-gray-400 mt-1">
        <span>Easy</span>
        <span>Medium</span>
        <span>Hard</span>
      </div>
    </div>

    <!-- TOGGLES -->
    <div class="grid grid-cols-2 gap-4">

      <div>
        <label class="block text-sm text-gray-300 mb-2">Good with kids</label>
        <button type="button"
          (click)="pet.goodWithKids = !pet.goodWithKids"
          class="w-full py-2 rounded-lg border transition"
          [ngClass]="pet.goodWithKids 
            ? 'bg-green-500 text-white' 
            : 'bg-[#1e293b] text-gray-300 border-white/10'">
          {{ pet.goodWithKids ? 'Yes 👍' : 'No 👎' }}
        </button>
      </div>

      <div>
        <label class="block text-sm text-gray-300 mb-2">Good with pets</label>
        <button type="button"
          (click)="pet.goodWithPets = !pet.goodWithPets"
          class="w-full py-2 rounded-lg border transition"
          [ngClass]="pet.goodWithPets 
            ? 'bg-green-500 text-white' 
            : 'bg-[#1e293b] text-gray-300 border-white/10'">
          {{ pet.goodWithPets ? 'Yes 🐾' : 'No 🚫' }}
        </button>
      </div>

    </div>

    <!-- IMAGE URL -->
    <div>
      <label class="block text-sm text-gray-300 mb-1">Image URL</label>
      <input [(ngModel)]="pet.imageUrl"
        name="imageUrl"
        class="w-full p-3 rounded-lg bg-[#1e293b] text-white border border-white/10"/>
    </div>

    <!-- FILE UPLOAD -->
    <div>
      <label class="block text-sm text-gray-300 mb-1">Or Upload Image</label>
      <input type="file" (change)="onFileSelected($event)" class="text-gray-300"/>
    </div>

    <!-- DESCRIPTION -->
    <div>
      <label class="block text-sm text-gray-300 mb-1">Description</label>
      <textarea [(ngModel)]="pet.description"
        name="desc"
        rows="4"
        class="w-full p-3 rounded-lg bg-[#1e293b] text-white border border-white/10">
      </textarea>
    </div>

    <!-- SUBMIT -->
    <button type="submit"
      [disabled]="form.invalid"
      class="w-full bg-gradient-to-r from-blue-500 to-cyan-400 
             text-white py-3 rounded-lg 
             hover:opacity-90 transition shadow
             disabled:opacity-50 disabled:cursor-not-allowed">
      Add Pet
    </button>

  </form>

</div>
