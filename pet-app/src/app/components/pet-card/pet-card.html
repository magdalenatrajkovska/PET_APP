<div [routerLink]="['/pet', pet.id]" class="cursor-pointer">
  <div class="bg-[#1e293b] rounded-2xl shadow-md hover:shadow-xl 
              transition duration-300 overflow-hidden 
              border border-white/10">
              
    <img 
      [src]="pet.imageUrl" 
      alt="{{ pet.name }}" 
      class="w-full h-48 object-cover"
    />

    <div class="h-1 bg-linear-to-r from-blue-500 to-cyan-400"></div>

    <div class="p-4">

      <!-- FIX: make title white -->
      <h3 class="text-xl font-semibold mb-2 text-white">
        {{ pet.name }}
      </h3>
      
      <!-- FIX: lighter gray -->
      <p class="text-sm text-gray-400">
        {{ pet.type }} • {{ pet.age }} years
      </p>

      <!-- FIX: readable gray + white labels -->
      <div class="mt-2 text-sm text-gray-300 space-y-1">
        <p><span class="font-medium text-white">Energy:</span> {{ pet.energyLevel }}</p>
        <p><span class="font-medium text-white">Space:</span> {{ pet.spaceNeed }}</p>
        <p><span class="font-medium text-white">Care:</span> {{ pet.careLevel }}</p>
      </div>

      <!-- FIX: softer muted text -->
      <div class="mt-2 text-xs text-gray-400">
        👶 {{ pet.goodWithKids ? 'Good with kids' : 'Not for kids' }}  
        <br>
        🐾 {{ pet.goodWithPets ? 'Good with pets' : 'Prefers to be alone' }}
      </div>

      <!-- FIX: description readable -->
      <p class="mt-3 text-sm text-gray-300 line-clamp-3">
        {{ pet.description }}
      </p>

    </div>

  </div>
</div>
